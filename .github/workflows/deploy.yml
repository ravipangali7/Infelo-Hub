name: Infelo Auto Deployment WORKING

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            git pull origin main


            cd ${{ secrets.VPS_PATH }}/server
            source env/bin/activate
            python manage.py migrate
            sudo systemctl restart infelohub

            cd ${{ secrets.VPS_PATH }}/web
            npm run build
